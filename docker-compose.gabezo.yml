version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=test
      - PORT=3000
      - SOLANA_RPC_URL=http://rpc-mock:8899
      - SOLANA_NETWORK=devnet
      - LIFI_API_KEY=mock
      - ELEVENLABS_API_KEY=mock
      - ELEVENLABS_VOICE_ID=EXAVITQu4vr4xnSDxMaL
      - DATABASE_URL=postgres://vibebroker:vibebroker@postgres:5432/vibebroker
      - VOICE_CONFIDENCE_MIN=0.8
      - VOICE_ONLY_MAX_PER_OP=0.1
      - VOICE_ONLY_DAILY_CAP=0.5
      - SESSION_KEYS_ALLOWED=false
    depends_on:
      postgres:
        condition: service_healthy
      lifi-mock:
        condition: service_started
      rpc-mock:
        condition: service_started
    volumes:
      - .:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: vibebroker
      POSTGRES_PASSWORD: vibebroker
      POSTGRES_DB: vibebroker
    ports:
      - "5432:5432"
    volumes:
      - ./backend/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibebroker"]
      interval: 5s
      timeout: 3s
      retries: 5

  lifi-mock:
    build:
      context: ./gabezo/mocks
      dockerfile: Dockerfile.lifi
    ports:
      - "3001:3001"

  rpc-mock:
    build:
      context: ./gabezo/mocks
      dockerfile: Dockerfile.rpc
    ports:
      - "8899:8899"

  tts-proxy:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./gabezo/mocks:/app
    command: node tts-proxy.js
    ports:
      - "3002:3002"
    environment:
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-mock}
      - TTS_CACHE_DIR=/app/tmp/tts
