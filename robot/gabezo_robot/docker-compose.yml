version: "3.9"

services:
  backend:
    image: node:20-alpine
    working_dir: /workspace
    volumes:
      - ../../:/workspace
    command: >
      sh -c "npm install &&
             npm run db:migrate &&
             npm run dev -- --hostname 0.0.0.0 --port 3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgres://vibebroker:vibebroker@postgres:5432/vibebroker
      LIFI_API_KEY: mock
      ELEVENLABS_API_KEY: mock
      VOICE_CONFIDENCE_MIN: "0.8"
      VOICE_ONLY_MAX_PER_OP: "0.1"
      VOICE_ONLY_DAILY_CAP: "0.5"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      lifi-mock:
        condition: service_started
      tts-mock-robot:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: vibebroker
      POSTGRES_PASSWORD: vibebroker
      POSTGRES_DB: vibebroker
    ports:
      - "5432:5432"
    volumes:
      - ../../backend/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibebroker -d vibebroker"]
      interval: 5s
      timeout: 3s
      retries: 20

  lifi-mock:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ../../gabezo/mocks:/app
    command: node lifi-mock.js
    ports:
      - "3001:3001"

  wake-mock:
    image: python:3.11-slim
    working_dir: /workspace
    volumes:
      - ../../:/workspace
    command: python robot/gabezo_robot/mocks/wake-mock.py
    ports:
      - "4001:4001"

  asr-mock:
    image: python:3.11-slim
    working_dir: /workspace
    volumes:
      - ../../:/workspace
    command: python robot/gabezo_robot/mocks/asr-mock.py
    ports:
      - "4002:4002"

  tts-mock-robot:
    image: python:3.11-slim
    working_dir: /workspace
    volumes:
      - ../../:/workspace
    command: python robot/gabezo_robot/mocks/tts-mock.py
    ports:
      - "4003:4003"
